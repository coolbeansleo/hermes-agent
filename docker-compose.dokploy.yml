#
# docker-compose.dokploy.yml — deploy overlay for Dokploy (Stack A) + Tailscale
#
# Owned by the `deploy` branch of this fork; `main` stays a pristine mirror of
# upstream (auto-synced). Dokploy builds only from this file, so upstream syncs
# never conflict with it.
#
# Differences vs. upstream docker-compose.yml:
#   1. gateway keeps network_mode: host  → reaches the local LLM directly over
#      the host's Tailscale interface (100.x), and runs messaging/cron.
#   2. dashboard runs on dokploy-network (NOT host) so Dokploy's Traefik can
#      route hermes.lumavida.cloud -> dashboard:9119 with Let's Encrypt TLS,
#      exactly like other Dokploy services. It binds 0.0.0.0 inside its own
#      container; a non-loopback bind engages the auth gate, so the basic-auth
#      env vars below are required (without an auth provider it fails closed).
#
# Public exposure = Dokploy Traefik + Let's Encrypt (see Dokploy -> Domains).
# Identity auth: keep basic auth as the baseline; optionally add Nous-Portal
# OAuth via `hermes dashboard register` + HERMES_DASHBOARD_OAUTH_CLIENT_ID.
#
# NOTE: because the dashboard is now bridge-networked, its in-process agent
# reaches the Tailscale LLM (100.x) THROUGH the host. That needs a one-time
# host rule (MASQUERADE on tailscale0) -- see the deploy notes.
#
services:
  gateway:
    build: .
    image: hermes-agent
    container_name: hermes
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
    command: ["gateway", "run"]

  dashboard:
    image: hermes-agent
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    networks:
      - dokploy-network
    expose:
      - "9119"
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # Auth gate (engaged by the non-loopback bind). Values come from Dokploy env.
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD}
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASHBOARD_BASIC_AUTH_SECRET}
      # Public URL behind the reverse proxy (link/callback construction).
      - HERMES_DASHBOARD_PUBLIC_URL=${HERMES_DASHBOARD_PUBLIC_URL}
    command: ["dashboard", "--host", "0.0.0.0", "--no-open"]

networks:
  dokploy-network:
    external: true
